# LiteLLM Proxy Configuration
# Generated by bootstrap.sh — manual edits will be overwritten on next bootstrap run.
# Model aliases: downstream consumers use these names, never raw Ollama model tags.
model_list:
  - model_name: reasoning-model
    litellm_params:
      model: ollama_chat/qwen3:14b
      api_base: http://ollama:11434
      api_key: none
  - model_name: classifier-model
    litellm_params:
      model: ollama_chat/gemma3:4b
      api_base: http://ollama:11434
      api_key: none
  - model_name: embedding-model
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434
      api_key: none

general_settings:
  master_key: sk-maai-local

litellm_settings:
  drop_params: true
  merge_reasoning_content_in_choices: true
