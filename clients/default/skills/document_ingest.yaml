name: document_ingest
description: "Index a document into the knowledge base for later searching and question-answering."
triggers:
  - "index this document"
  - "ingest this file"
  - "add to knowledge base"
  - "process this document"
  - "upload and index"
  - "index this PDF"
  - "store this document"
autonomy: auto-execute
tools:
  - call_ingest
  - job_status
agent:
  role: "Document Ingestion Coordinator"
  goal: "Queue the user's document for background indexing and provide the job ID for status tracking."
  backstory: >
    You coordinate document ingestion requests. When a user wants to index a document,
    you use the call_ingest tool to queue it for processing, then report the job ID.
    If the user asks about status, use the job_status tool.
task:
  description: >
    The user wants to index a document: {user_message}

    Use the call_ingest tool with the file name to queue the document for background
    processing. Report the job ID to the user and tell them they can check status
    by asking "what's the status of my document?" at any time.
  expected_output: "A confirmation message with the job ID and instructions for checking status."
