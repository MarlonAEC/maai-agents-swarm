name: maai-platform

networks:
  maai-net:
    driver: bridge

volumes:
  ollama-models:
  webui-data:
  maai-uploads:    # Shared between pipelines (write) and core-api (read) — per D-15
  qdrant-data:     # Qdrant persistent vector storage
  redis-data:      # Redis persistence for ARQ job queue
  easyocr-models:  # EasyOCR model cache for docproc

services:

  # ── Ollama: GPU profile ────────────────────────────────────────────────────
  ollama-gpu:
    container_name: ollama
    image: ollama/ollama
    profiles: [gpu]
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - maai-net
    restart: unless-stopped

  # ── Ollama: CPU profile ────────────────────────────────────────────────────
  ollama-cpu:
    container_name: ollama
    image: ollama/ollama
    profiles: [cpu]
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - maai-net
    restart: unless-stopped

  # ── LiteLLM proxy ─────────────────────────────────────────────────────────
  litellm:
    container_name: litellm
    image: ghcr.io/berriai/litellm:main-latest  # MUST resolve to >=1.83.0 — versions 1.82.7/1.82.8 were backdoored
    command: ["--config", "/app/config.yaml"]
    volumes:
      - ./config/litellm/proxy_config.yaml:/app/config.yaml:ro
    env_file:
      - ${CLIENT_ENV_PATH:-clients/default/client.env}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      ollama-gpu:
        condition: service_healthy
        required: false
      ollama-cpu:
        condition: service_healthy
        required: false
    networks:
      - maai-net
    restart: unless-stopped

  # ── Open WebUI ─────────────────────────────────────────────────────────────
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=http://litellm:4000/v1;http://pipelines:9099
      # Keys must match OPENAI_API_BASE_URLS order: LiteLLM;Pipelines
      # Loaded from env_file (client.env) — do NOT interpolate with ${} here
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_AUTH=true
      - PORT=8080
      - ENABLE_WEBSOCKET_SUPPORT=false
    env_file:
      - ${CLIENT_ENV_PATH:-clients/default/client.env}
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - webui-data:/app/backend/data
    depends_on:
      litellm:
        condition: service_healthy
      pipelines:
        condition: service_healthy
    networks:
      - maai-net
    restart: unless-stopped

  # -- Core API (FastAPI + CrewAI) -----------------------------------------------
  core-api:
    container_name: core-api
    build:
      context: ./src/core_api
      dockerfile: Dockerfile
    env_file:
      - ${CLIENT_ENV_PATH:-clients/default/client.env}
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-maai-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - CLIENT_ID=${CLIENT_ID:-default}                          # Phase 3: skill/tool config lookup
      - OLLAMA_BASE_URL=http://ollama:11434                       # Phase 3: direct Ollama access for skill matcher embeddings
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DOCPROC_URL=http://docproc:8001
    volumes:
      - maai-uploads:/app/uploads
      - ./clients:/app/clients:ro    # Per-client skills and tools config (Phase 3)
    ports:
      - "${CORE_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      litellm:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama-gpu:
        condition: service_healthy
        required: false
      ollama-cpu:
        condition: service_healthy
        required: false
    networks:
      - maai-net
    restart: unless-stopped

  # -- Pipelines (Open WebUI plugin server) --------------------------------------
  pipelines:
    container_name: pipelines
    image: ghcr.io/open-webui/pipelines:main
    env_file:
      - ${CLIENT_ENV_PATH:-clients/default/client.env}
    environment:
      - PIPELINES_API_KEY=${PIPELINES_API_KEY:-0p3n-w3bu!}
    volumes:
      - ./src/pipelines:/app/pipelines    # Mount plugin files directly — per D-13
      - maai-uploads:/app/uploads          # Shared upload volume — per D-15
      - webui-data:/app/webui-data:ro      # Read Open WebUI uploads for ingestion
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9099/')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - maai-net
    restart: unless-stopped

  # -- Redis (ARQ broker + GPU lock) -- Phase 4 D-11 ----------------------------
  redis:
    container_name: redis
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - maai-net
    restart: unless-stopped

  # -- Qdrant (vector database) -- Phase 4 D-11 ---------------------------------
  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:v1.13.6
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:6333/healthz')\" 2>/dev/null || wget -q --spider http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - maai-net
    restart: unless-stopped

  # -- Docproc (Docling + EasyOCR document processor) -- Phase 4 D-09 -----------
  docproc:
    container_name: docproc
    build:
      context: ./src/docproc
      dockerfile: Dockerfile
    env_file:
      - ${CLIENT_ENV_PATH:-clients/default/client.env}
    environment:
      - DOCPROC_USE_GPU=${DOCPROC_USE_GPU:-false}
    volumes:
      - maai-uploads:/app/uploads
      - easyocr-models:/root/.EasyOCR
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - maai-net
    restart: unless-stopped

  # -- Ingest Worker (ARQ background document processor) -- Phase 4 D-01 --------
  ingest-worker:
    container_name: ingest-worker
    build:
      context: ./src/core_api
      dockerfile: Dockerfile
    command: ["arq", "workers.ingest_worker.WorkerSettings"]
    env_file:
      - ${CLIENT_ENV_PATH:-clients/default/client.env}
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-maai-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - CLIENT_ID=${CLIENT_ID:-default}
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DOCPROC_URL=http://docproc:8001
    volumes:
      - maai-uploads:/app/uploads
      - ./clients:/app/clients:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docproc:
        condition: service_healthy
      ollama-gpu:
        condition: service_healthy
        required: false
      ollama-cpu:
        condition: service_healthy
        required: false
    networks:
      - maai-net
    restart: unless-stopped
